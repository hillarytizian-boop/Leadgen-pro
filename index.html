<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadGen Pro - Full System</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide/dist/lucide.min.js"></script>
    <style>
        /* Keep your original styles */
        .table-admin td:first-child { width: 200px; }
        .dashboard-tab.tab-active { background: rgba(255, 255, 255, 0.1); border-left: 3px solid #667eea; }
        .glass-dark { backdrop-filter: blur(10px); }
        .toast { opacity: 0; transition: all 0.3s ease; }
        .toast.show { opacity: 1; }
        .badge-pending { background-color: #FBBF24; color: #fff; }
        .badge-approved { background-color: #10B981; color: #fff; }
        .badge-rejected { background-color: #EF4444; color: #fff; }
    </style>
</head>
<body><!-- HERO SECTION --><section id="hero">
    <h1>LeadGen Pro</h1>
    <p>Generate real leads for your business instantly!</p>
    <button id="generate-leads-btn">Generate Leads</button>
</section><!-- LEADS TABLE --><section id="leads-section">
    <h2>Generated Leads</h2>
    <div id="leads-table"></div>
    <button onclick="exportCSV()">Export CSV</button>
</section><!-- SAVED LEADS --><section id="saved-leads-section">
    <h2>Saved Leads</h2>
    <div id="saved-leads-table"></div>
</section><!-- PAYMENT MODAL --><div id="payment-modal" class="hidden">
    <form id="payment-form" onsubmit="handlePaymentSubmit(event)">
        <input type="hidden" id="payment-plan">
        <input type="email" id="payment-email" placeholder="Your Email">
        <select id="payment-method">
            <option value="PayPal">PayPal</option>
            <option value="Credit Card">Credit Card</option>
        </select>
        <input type="text" id="payment-txn-id" placeholder="Transaction ID">
        <input type="file" id="payment-screenshot">
        <button type="submit">Submit Payment</button>
    </form>
    <button onclick="hidePaymentModal()">Close</button>
</div><!-- ADMIN AUTH MODAL --><div id="admin-auth-modal" class="hidden">
    <form id="admin-login-form" onsubmit="handleAdminLogin(event)">
        <input type="email" id="admin-email" placeholder="Admin Email">
        <input type="password" id="admin-password" placeholder="Password">
        <button type="submit">Login</button>
    </form>
    <button onclick="hideAdminAuthModal()">Close</button>
</div><!-- ADMIN DASHBOARD --><section id="admin-dashboard" class="hidden">
    <h2>Admin Dashboard</h2>
    <label>Status Filter:</label>
    <select id="admin-status-filter" onchange="renderAdminTable()">
        <option value="all">All</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
    </select>
    <p>Total Requests: <span id="admin-total-requests"></span></p>
    <p>Pending: <span id="admin-pending"></span></p>
    <p>Approved: <span id="admin-approved"></span></p>
    <p>Rejected: <span id="admin-rejected"></span></p>
    <table>
        <thead>
            <tr>
                <th>Email</th>
                <th>Plan</th>
                <th>Method</th>
                <th>Transaction</th>
                <th>Date</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="admin-table-body"></tbody>
    </table>
</section><!-- TOAST CONTAINER --><div id="toast-container" class="fixed top-4 right-4"></div><script>
// ============================================
// DATABASE KEYS
// ============================================
const DB_KEYS = {
    USERS: 'leadgen_users',
    PAYMENTS: 'leadgen_payments',
    SAVED_LEADS: 'leadgen_saved_leads'
};

// ============================================
// GLOBAL VARIABLES
// ============================================
let currentLeads = [];

// ============================================
// UTILITY FUNCTIONS
// ============================================
function initDB() {
    if (!localStorage.getItem(DB_KEYS.USERS)) localStorage.setItem(DB_KEYS.USERS, JSON.stringify([]));
    if (!localStorage.getItem(DB_KEYS.PAYMENTS)) localStorage.setItem(DB_KEYS.PAYMENTS, JSON.stringify([]));
    if (!localStorage.getItem(DB_KEYS.SAVED_LEADS)) localStorage.setItem(DB_KEYS.SAVED_LEADS, JSON.stringify({}));
}

function getUsers() { return JSON.parse(localStorage.getItem(DB_KEYS.USERS)) || []; }
function setUsers(users) { localStorage.setItem(DB_KEYS.USERS, JSON.stringify(users)); }

function getPayments() { return JSON.parse(localStorage.getItem(DB_KEYS.PAYMENTS)) || []; }
function setPayments(payments) { localStorage.setItem(DB_KEYS.PAYMENTS, JSON.stringify(payments)); }

function getSavedLeads() { return JSON.parse(localStorage.getItem(DB_KEYS.SAVED_LEADS)) || {}; }
function setSavedLeads(saved) { localStorage.setItem(DB_KEYS.SAVED_LEADS, JSON.stringify(saved)); }

function getCurrentUser() { return JSON.parse(localStorage.getItem('current_user')); }
function setCurrentUser(user) { localStorage.setItem('current_user', JSON.stringify(user)); }

function generatePhone(country) {
    const formats = { US: '+1 (xxx) xxx-xxxx', UK: '+44 xxxx xxxxxx', CA: '+1 (xxx) xxx-xxxx', AU: '+61 x xxx xxxx', DE: '+49 xxx xxxxxxx', FR: '+33 x xx xx xx xx', IN: '+91 xxxxx xxxxx', BR: '+55 xx xxxxx-xxxx' };
    let format = formats[country] || '+1 (xxx) xxx-xxxx';
    return format.replace(/x/g, () => Math.floor(Math.random() * 10));
}

function generateEmail() {
    const prefixes = ['contact','info','sales','hello','support','business'];
    return prefixes[Math.floor(Math.random()*prefixes.length)]+Math.floor(Math.random()*1000)+'@example.com';
}

function generateBusinessName(keyword) {
    const adjectives = ['Dynamic','Prime','Elite','Pro','Smart','Fast','Global','Tech'];
    const suffixes = ['Solutions','Systems','Group','Corp','Inc','Ventures','Partners','Digital'];
    const adj = adjectives[Math.floor(Math.random()*adjectives.length)];
    const suff = suffixes[Math.floor(Math.random()*suffixes.length)];
    return adj+' '+keyword+' '+suff;
}

// ============================================
// RENDER FUNCTIONS
// ============================================
function renderLeadsTable(leads, elementId) {
    const container = document.getElementById(elementId);
    if(leads.length===0){container.innerHTML='<p class="text-gray-400 text-center py-12">No leads available.</p>'; return;}
    let html='<table class="w-full table-admin"><thead><tr><th>#</th><th>Business Name</th><th>Email</th><th>Phone</th><th>Country</th><th>Action</th></tr></thead><tbody>'; 
    leads.forEach((lead,index)=>{html+=`<tr><td>${index+1}</td><td>${lead.name}</td><td>${lead.email}</td><td>${lead.phone}</td><td>${lead.country}</td><td><button onclick="saveLead(${lead.id})">Save</button></td></tr>`});
    html+='</tbody></table>'; container.innerHTML=html;
}

function saveLead(id){
    const user=getCurrentUser(); if(!user) return;
    const saved=getSavedLeads(); if(!saved[user.id]) saved[user.id]=[];
    const exists=saved[user.id].some(l=>l.id===id); if(!exists){
        const lead=currentLeads.find(l=>l.id===id); if(lead){saved[user.id].push(lead); setSavedLeads(saved); showToast('Lead saved!', 'success');}}
    else showToast('Already saved!', 'info');
}

function renderSavedLeads(){
    const user=getCurrentUser(); if(!user)return;
    const saved=getSavedLeads(); const leads=saved[user.id]||[];
    renderLeadsTable(leads,'saved-leads-table');
}

function exportCSV(){
    if(currentLeads.length===0){showToast('No leads to export','error'); return;}
    let csv='ID,Business Name,Email,Phone,Country,Timestamp\n';
    currentLeads.forEach(l=>{csv+=`${l.id},"${l.name}","${l.email}","${l.phone}","${l.country}","${l.timestamp}"\n`;});
    const blob=new Blob([csv],{type:'text/csv'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`leads_${new Date().toISOString().split('T')[0]}.csv`; a.click(); URL.revokeObjectURL(url); showToast('CSV exported!','success');
}

// ============================================
// TOAST FUNCTION
// ============================================
function showToast(msg,type='info'){
    const container=document.getElementById('toast-container'); const toast=document.createElement('div');
    const colors={success:'bg-green-500/20 border-green-500/30 text-green-400',error:'bg-red-500/20 border-red-500/30 text-red-400',info:'bg-blue-500/20 border-blue-500/30 text-blue-400'};
    toast.className=`glass-dark border rounded-lg px-4 py-3 flex items-center space-x-3 shadow-lg toast ${colors[type]}`;
    toast.textContent=msg; container.appendChild(toast);
    setTimeout(()=>toast.classList.add('show'),100);
    setTimeout(()=>{toast.classList.remove('show'); setTimeout(()=>toast.remove(),300);},3000);
}

// ============================================
// INIT
// ============================================
function init(){
    initDB();
    const btn=document.getElementById('generate-leads-btn');
    btn.addEventListener('click',()=>{
        btn.disabled=true; btn.textContent='Generating...';
        setTimeout(()=>{
            currentLeads=[];
            for(let i=0;i<5;i++){
                currentLeads.push({id:Date.now()+i,name:generateBusinessName('Biz'),email:generateEmail(),phone:generatePhone('US'),country:'US',timestamp:new Date().toISOString()});
            }
            renderLeadsTable(currentLeads,'leads-table');
            renderSavedLeads();
            btn.disabled=false; btn.textContent='Generate Leads';
            showToast('Leads generated!','success');
        },1500);
    });
}

document.addEventListener('DOMContentLoaded',init);
</script></body>
</html>
